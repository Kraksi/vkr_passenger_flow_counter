services:
  counter:
    build:
      context: .
      dockerfile: Dockerfile
    image: passenger-counter:latest
    container_name: passenger-counter
    ports:
      - "8000:8000"
    gpus: all
    restart: unless-stopped
    volumes:
      - ./data/uploads:/app/data/uploads
      - counter-db:/app/state
    environment:
      - VKR_STATE_DIR=/app/state
      - VKR_MODEL_PATH=/app/models/yolo11_head.pt
      - VKR_REID_WEIGHTS=/app/models/osnet_x0_25_mot20head.pt
      - VKR_TRACKER_BACKEND=osnet
      - VKR_COUNTER_MODE=zone
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

volumes:
  counter-db:
